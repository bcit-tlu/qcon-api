{{- if not .Values.vault.enabled }}
{{- if not .Values.postgres.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  labels:
    {{- include "qcon-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_USER: {{ .Values.postgres.username | quote }}
  POSTGRES_PASSWORD: {{ .Values.postgres.password | quote }}
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
{{- end }}
---
{{- if not .Values.appCredentials.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: app-internal-credentials
  labels:
    {{- include "qcon-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  ADMIN_USERNAME: {{ .Values.appCredentials.adminUsername | quote }}
  ADMIN_PASSWORD: {{ .Values.appCredentials.adminPassword | quote }}
  DJANGO_SECRET_KEY: {{ .Values.appCredentials.djangoSecretKey | quote }}
{{- end }}
---
{{- if not .Values.apiKey.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: api-key
  labels:
    {{- include "qcon-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  API_KEY: {{ .Values.apiKey.key | quote }}
{{- end }}
{{- end }}
