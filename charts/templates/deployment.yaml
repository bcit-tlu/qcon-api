apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "qcon-api.fullname" . }}
  labels:
    {{- include "qcon-api.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "qcon-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qcon-api.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "qcon-api.serviceAccountName" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      {{- if ne (toJson .) "{}" }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: qcon-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_VERSION
              value: {{ .Values.image.tag | default .Chart.AppVersion | quote }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.postgres.enabled .Values.appCredentials.enabled .Values.apiKey.enabled }}
          volumeMounts:
            {{- if .Values.postgres.enabled }}
            - name: db-credentials
              mountPath: /etc/secrets/db-credentials
              readOnly: true
            {{- end }}
            {{- if .Values.appCredentials.enabled }}
            - name: app-internal-credentials
              mountPath: /etc/secrets/app-internal-credentials
              readOnly: true
            {{- end }}
            {{- if .Values.apiKey.enabled }}
            - name: api-key
              mountPath: /etc/secrets/api-key
              readOnly: true
            {{- end }}
          {{- end }}
      {{- if or .Values.postgres.enabled .Values.appCredentials.enabled .Values.apiKey.enabled }}
      volumes:
        {{- if .Values.postgres.enabled }}
        - name: db-credentials
          secret:
            secretName: {{ .Values.postgres.existingSecret | default "db-credentials" }}
            optional: true
        {{- end }}
        {{- if .Values.appCredentials.enabled }}
        - name: app-internal-credentials
          secret:
            secretName: {{ .Values.appCredentials.existingSecret | default "app-internal-credentials" }}
            optional: true
        {{- end }}
        {{- if .Values.apiKey.enabled }}
        - name: api-key
          secret:
            secretName: {{ .Values.apiKey.existingSecret | default "api-key" }}
            optional: true
        {{- end }}
      {{- end }}
