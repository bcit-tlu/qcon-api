replicaCount: 1

image:
  repository: ghcr.io/bcit-tlu/qcon-api/qcon-api
  pullPolicy: IfNotPresent
  tag: "" # Defaults to .Chart.AppVersion

service:
  type: ClusterIP
  port: 8000

serviceAccount:
  create: true
  annotations: {}
  name: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

probes:
  liveness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 5

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

# Optional hard anti-affinity across topology zones.
# Ensure enough distinct zones exist for replicaCount.
zoneAntiAffinity:
  enabled: false
  topologyKey: topology.kubernetes.io/zone

nodeSelector: {}
tolerations: []
affinity: {}
