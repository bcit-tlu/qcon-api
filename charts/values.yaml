replicaCount: 1

image:
  repository: ghcr.io/bcit-tlu/qcon-api/qcon-api
  pullPolicy: IfNotPresent
  tag: "" # Defaults to .Chart.AppVersion

service:
  type: ClusterIP
  port: 8000

serviceAccount:
  create: true
  annotations: {}
  name: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

probes:
  liveness:
    path: /
    initialDelaySeconds: 15
    periodSeconds: 10
  readiness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 5

resources:
  limits:
    cpu: 500m
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 512Mi

nodeSelector: {}
tolerations: []

# Pod (anti-)affinity rules. Set raw Kubernetes affinity here.
#
# Example: hard anti-affinity to spread replicas across zones.
# Ensure enough distinct zones exist for replicaCount, otherwise
# pods will remain Pending.
#
# affinity:
#   podAntiAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       - labelSelector:
#           matchLabels:
#             app.kubernetes.io/name: qcon-api
#             app.kubernetes.io/instance: <release-name>
#         topologyKey: topology.kubernetes.io/zone
affinity: {}

# ── PostgreSQL database credentials ──────────────────────────
# The app reads credentials from files in /etc/secrets/db-credentials/.
# When vault.enabled=false, the chart creates a K8s Secret from these
# values and mounts it at the expected path.  When vault.enabled=true,
# the secret is expected to be provisioned externally (e.g. by the
# Vault Secrets Operator via a VaultDynamicSecret).
#
# Pre-existing secret: set existingSecret to the name of a Secret
# that already contains keys POSTGRES_DB, POSTGRES_USER,
# POSTGRES_PASSWORD, POSTGRES_HOST, POSTGRES_PORT.  The chart will
# mount it without creating its own.
postgres:
  host: "postgres"
  port: "5432"
  database: "qcon-api"
  username: "postgres"
  password: "postgres"
  existingSecret: ""

# ── App internal credentials ─────────────────────────────────
# Django admin account and secret key, read from
# /etc/secrets/app-internal-credentials/.
appCredentials:
  adminUsername: "admin"
  adminPassword: "admin"
  djangoSecretKey: "change-me-in-production"
  existingSecret: ""

# ── API key ──────────────────────────────────────────────────
# Shared API key for authenticated endpoints, read from
# /etc/secrets/api-key/.
apiKey:
  key: "change-me-in-production"
  existingSecret: ""

# Vault / external secret-management toggle.
# When true the chart does NOT create any Secret resources and expects
# them to be provisioned externally (e.g. VaultDynamicSecret /
# VaultStaticSecret managed by the Vault Secrets Operator).
# Secret names expected by the deployment:
#   db-credentials            — keys: POSTGRES_DB, POSTGRES_USER,
#                                      POSTGRES_PASSWORD, POSTGRES_HOST,
#                                      POSTGRES_PORT
#   app-internal-credentials  — keys: ADMIN_USERNAME, ADMIN_PASSWORD,
#                                      DJANGO_SECRET_KEY
#   api-key                   — keys: API_KEY
vault:
  enabled: false
